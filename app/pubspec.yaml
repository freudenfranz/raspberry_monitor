name: raspberry_monitor
description: A new Flutter project with Clean Architecture
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: 17.1.0

  # UI & Theming
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.8

  # Dependency Injection
  get_it: ^7.7.0
  get_it_mixin: ^4.2.0
  injectable: ^2.4.4

  # Storage & Persistence
  shared_preferences: ^2.5.4

  # Networking & Connectivity
  connectivity_plus: ^6.1.1
  internet_connection_checker: ^1.0.0+1

  # Functional Programming
  dartz: ^0.10.1

  # App Information
  package_info_plus: ^9.0.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: any
  # Code Generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  json_serializable: ^6.7.1

  # MQTT
  mqtt5_client: ^4.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Analysis
  flutter_lints: ^6.0.0
  custom_lint:
  solid_lints: ^0.3.1

  # Code Generation
  build_runner: ^2.7.1
  flutter_gen_runner: ^5.13.0
  freezed: ^3.2.3
  injectable_generator: ^2.6.2

  # Testing
  mockito: ^5.5.0
  bloc_test: 9.1.7

flutter:
  uses-material-design: true
  generate: true
  # Uncomment and add your assets here
  # assets:
  #   - images/
  #   - translations/

  # App fonts
  fonts:
    - family: Poppins
      fonts:
      - asset: assets/fonts/Poppins/Poppins-Light.ttf
        weight: 300
      - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        weight: 400
      - asset: assets/fonts/Poppins/Poppins-Medium.ttf
        weight: 500
      - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Poppins/Poppins-Bold.ttf
        weight: 700
